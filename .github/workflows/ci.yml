name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      SESSION_SECRET: test_session_secret_32_characters_min
      CRON_SECRET: test_cron_secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      TOKEN_ENCRYPTION_KEY: test_token_encryption_key_32_chars_min
      JWT_SIGNING_SECRET: test_jwt_signing_secret_32_chars_min
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
